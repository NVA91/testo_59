version: '3.8'

services:
  qa-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qa-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - ./local_files:/app/local_files
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  qa-gui:
    build:
      context: ./gui
      dockerfile: Dockerfile
    container_name: qa-gui
    restart: unless-stopped
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      qa-backend:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - BACKEND_URL=http://qa-backend:8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 10s
      timeout: 5s
      retries: 3